<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperEdits Pro - Official Download</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        .card { background: #1e293b; max-width: 400px; margin: 50px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; font-size: 24px; }
        p { color: #94a3b8; font-size: 14px; }
        .btn-download { background: #22c55e; color: white; padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-download:hover { background: #16a34a; }
        
        /* Modal Popup Styling */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #1e293b; padding: 20px; border-radius: 10px; text-align: center; width: 85%; max-width: 320px; position: relative; }
        .close-btn { position: absolute; top: 8px; right: 12px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; display: none; font-weight: bold; }
        .timer-text { font-size: 12px; color: #f59e0b; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>HyperEdits Pro</h1>
        <p>Best 4K Video Editor & AI Effects without Watermark</p>
        <button class="btn-download" onclick="openDownloadModal()">Install / Download APK</button>
    </div>

    <!-- Download Anyway Modal Popup -->
    <div class="modal-overlay" id="downloadModal">
        <div class="modal-box">
            <button class="close-btn" id="closeBtn" onclick="closeModalAndDownload()">✓</button>
            <h3 style="margin-top: 5px;">Download File?</h3>
            <p>File might be harmful (Standard APK warning). Do you want to download anyway?</p>
            
            <div id="adArea" style="background: #334155; padding: 15px; border-radius: 6px; margin: 10px 0; font-size: 13px; color: #cbd5e1;">
                📢 <b>Ad Area:</b> Ad network link will show here.<br>
                <span class="timer-text" id="timer">Please wait 3 seconds to close...</span>
            </div>

            <button class="btn-download" style="background: #3b82f6;" onclick="triggerAdAndDownload()">Download Anyway</button>
        </div>
    </div>

    <script>
        function openDownloadModal() {
            document.getElementById('downloadModal').style.display = 'flex';
        }

        function triggerAdAndDownload() {
            // 1. ओपन एड लिंक (Adsterra / Popunder Network)
            window.open('https://google.com', '_blank'); // यहाँ आपका Ad Network Direct Link आएगा

            // 2. 3 सेकंड का टाइमर चालू करें क्लोज बटन के लिए
            let seconds = 3;
            let timerElement = document.getElementById('timer');
            let closeBtn = document.getElementById('closeBtn');

            timerElement.innerText = "Closing button in " + seconds + " seconds...";

            let interval = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    timerElement.innerText = "Closing button in " + seconds + " seconds...";
                } else {
                    clearInterval(interval);
                    timerElement.innerText = "Ready! Click ✓ to start downloading.";
                    closeBtn.style.display = 'block'; // 3 सेकंड बाद राइट/क्लोज बटन दिखेगा
                }
            }, 1000);
        }

        function closeModalAndDownload() {
            document.getElementById('downloadModal').style.display = 'none';
            // यहाँ असली APK डाउनलोड लिंक ट्रिगर होगा
            alert("Starting APK Download...");
            // window.location.href = "YOUR_DIRECT_APK_LINK_HERE";
        }
    </script>

</body>
</html>
